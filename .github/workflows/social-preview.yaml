name: Update Social Preview

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  fetch-social-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Download GitHub Open Graph preview
        run: |
          REPO_OWNER="tanazd2"
          REPO_NAME="termux-utils"
          # GitHub Open Graph URL
          PREVIEW_URL="https://opengraph.githubassets.com/1/${REPO_OWNER}/${REPO_NAME}"
          mkdir -p .github
          curl -L "$PREVIEW_URL" -o .github/social-preview.png

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/social-preview.png
          git commit -m "Auto-update social preview [skip ci]" || echo "No changes to commit"
          git push
