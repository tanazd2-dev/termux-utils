name: Auto Update Social Preview

# Trigger conditions
on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/social-preview.png'  # ignore social-preview updates to avoid loops
  release:
    types:
      - published
  schedule:
    - cron: '50 18 * * *'  # 00:20 IST
    - cron: '50 21 * * *'  # 03:20 IST
    - cron: '50 6  * * *'  # 12:20 IST
    - cron: '50 12 * * *'  # 18:20 IST

jobs:
  update-social-preview:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo code
      - name: Checkout repository
        uses: actions/checkout@v4  # Node 24 default, no warnings

      # 2️⃣ Download Open Graph social preview
      - name: Fetch GitHub Open Graph
        run: |
          REPO_OWNER="tanazd2"
          REPO_NAME="termux-utils"
          PREVIEW_URL="https://opengraph.githubassets.com/1/${REPO_OWNER}/${REPO_NAME}"
          mkdir -p .github
          echo "Downloading social preview from $PREVIEW_URL …"
          # Retry 3 times, do not fail workflow if curl fails
          curl -fL --retry 3 --retry-delay 2 "$PREVIEW_URL" -o .github/social-preview.png \
            || echo "⚠️ Failed to download social preview. Skipping update."

      # 3️⃣ Commit & push if image changed
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/social-preview.png
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update social preview [skip ci]"
            git push
          else
            echo "No changes to commit. Skipping push."
